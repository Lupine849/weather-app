<!DOCTYPE html>
<html lang="ja">

<head>

  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main>

    <header>
      <h1>天気アプリ</h1>

    <form>

    <section class="status">

      <dl></dl>
    </section>

  </main>

  <script src="main.js"></script>
</body>

</html>
