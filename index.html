<!DOCTYPE html>
<html lang="ja">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather App</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <main>

    <header>
      <h1>天気アプリ</h1>
    </header>

    <form id="weather-form">
      <label for="city-input">都市名</label>
      <div class="form-row">
        <input type="text" id="city-input" name="city" placeholder="都市名を入力" required>
        <button type="submit">検索</button>
      </div>
    </form>

    <section id="status">
      <p></p>
    </section>

    <section id="result">
      <h2 class="city-name"></h2>

      <dl>
        <dt>気温</dt>
        <dd class="temp"></dd>

        <dt>天気</dt>
        <dd class="weather"></dd>

        <dt>湿度</dt>
        <dd class="humidity"></dd>
      </dl>
    </section>

  </main>

  <script src="config.js"></script>
  <script src="main.js"></script>
</body>

</html>
